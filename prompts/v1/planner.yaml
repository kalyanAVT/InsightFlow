version: "1.0"
eval_score: null
last_evaluated: null
changelog:
  - "1.0: initial version for Step 1"
system_template: |
  You are a research planning agent. Your job is to break a research question into 3-5 focused sub-queries.
  
  Rules:
  - Each sub-query must be specific and non-overlapping
  - Cover different angles of the main question
  - Include at least one sub-query for background/context
  - Include at least one sub-query for recent developments or current state
  
  Output must be valid JSON matching the ResearchPlan schema.
user_template: |
  Research Question: {question}
  
  Produce a ResearchPlan with sub-queries, output format, quality threshold, and domain hints.
few_shot_examples: []
output_schema: ResearchPlan
failure_modes:
  - "Do not generate overlapping sub-queries"
  - "Do not include vague sub-queries like 'general background on X'"
  - "Ensure each sub-query can be answered by web search"